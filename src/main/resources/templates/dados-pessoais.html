<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Meus Dados | YL Seguros</title>
    <link rel="stylesheet" th:href="@{/estilo.css}">
    <style>
        .caixa-form {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            transition: all 0.4s ease;
        }

        /* Animação quando entra em modo de edição */
        .modo-edicao {
            border: 2px solid #0046c0;
            transform: scale(1.02);
        }

        .caixa-form h2 {
            color: #0046c0;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .campo {
            margin-bottom: 20px;
            position: relative;
        }

        .campo label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
            transition: color 0.3s;
        }

        .campo input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #f9f9f9;
        }

        .campo input:focus {
            outline: none;
            border-color: #0046c0;
            background-color: white;
            box-shadow: 0 0 8px rgba(0, 70, 192, 0.2);
        }

        .campo input[readonly] {
            background-color: #f1f1f1;
            cursor: not-allowed;
            border-color: transparent;
        }

        /* Botões Estilizados */
        .area-botoes {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        .btn-acao {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-editar {
            background-color: #ff9800;
            color: white;
        }

        .btn-editar:hover {
            background-color: #e68900;
            transform: translateY(-2px);
        }

        .btn-salvar {
            background-color: #28a745;
            color: white;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        .btn-salvar:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }

        .btn-voltar {
            background-color: #6c757d;
            color: white;
            text-decoration: none;
            text-align: center;
        }

        .btn-voltar:hover {
            background-color: #5a6268;
        }

        /* Feedback visual para campos editáveis */
        .edit-active input:not([readonly]) {
            border-color: #ff9800;
            background-color: white;
        }
    </style>
</head>

<body>

    <header>
        <div class="container topo">
            <h1>YL Seguros</h1>
            <nav>
                <ul>
                    <li><a th:href="@{/home}">Home</a></li>
                    <li><a th:href="@{/minha-conta}">👤 Minha Conta</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="cardDados" class="caixa-form" style="max-width: 600px; margin: 40px auto;">
            <h2>👤 Meus Dados Cadastrados</h2>
            <p style="color: #888; font-size: 0.9rem; margin-bottom: 20px;">Visualize ou atualize suas informações de
                contato abaixo.</p>
            <hr style="opacity: 0.2; margin-bottom: 25px;">

            <form th:action="@{/meus-dados/atualizar}" method="POST">

                <div class="campo">
                    <label>Nome Completo</label>
                    <input type="text" name="nome" id="nome" th:value="${usuario.nome}" readonly required>
                </div>

                <div class="campo">
                    <label>E-mail (Login)</label>
                    <input type="email" name="email" id="email" th:value="${usuario.email}" readonly required>
                </div>

                <div class="campo">
                    <label>Telefone / WhatsApp</label>
                    <input type="text" name="telefone" id="telefone" th:value="${usuario.telefone}" readonly required>
                </div>

                <div class="area-botoes">
                    <button type="button" id="btnEdit" onclick="ativarEdicao()" class="btn-acao btn-editar">
                        ✏️ Editar Informações
                    </button>

                    <button type="submit" id="btnSave" class="btn-acao btn-salvar" style="display:none;">
                        💾 Salvar Alterações
                    </button>

                    <a th:href="@{/minha-conta}" class="btn-acao btn-voltar">
                        Voltar
                    </a>
                </div>
            </form>
        </div>
    </main>

    <script>
        function ativarEdicao() {
            const card = document.getElementById('cardDados');
            const inputs = ['nome', 'email', 'telefone'];

            card.classList.add('modo-edicao');
            card.classList.add('edit-active');

            inputs.forEach(id => {
                const el = document.getElementById(id);
                el.readOnly = false;
                el.style.borderStyle = "solid";
            });

            document.getElementById('nome').focus();

            document.getElementById('btnEdit').style.display = 'none';
            const btnSave = document.getElementById('btnSave');
            btnSave.style.display = 'flex';

            console.log("Modo de edição ativado");
        }
    </script>
</body>

</html>
