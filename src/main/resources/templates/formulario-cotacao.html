<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Dados da Proposta | YL Seguros</title>
    <link rel="stylesheet" th:href="@{/estilo.css}">
    <style>
        .caixa-form {
            max-width: 900px !important;
            margin: 40px auto;
            padding: 30px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .grid-campos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .campo {
            display: flex;
            flex-direction: column;
            margin-bottom: 5px;
        }

        .full-width {
            grid-column: span 2;
        }

        /* Divisões de 3 colunas para CEP/Número/Complemento */
        .tres-colunas {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            grid-column: span 2;
        }

        .campo input {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        .campo input:read-only {
            background-color: #f9f9f9;
            color: #666;
        }

        .btn-salvar {
            background-color: #ff9800;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }

        @media (max-width: 600px) {

            .grid-campos,
            .tres-colunas {
                grid-template-columns: 1fr;
            }

            .full-width,
            .tres-colunas {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="container topo">
            <h1>YL Seguros</h1>
            <nav>
                <ul>
                    <li><a th:href="@{/home}">Home</a></li>
                    <li><a th:href="@{/carrinho}">🛒 Carrinho</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="caixa-form">
            <h2>📝 Quase lá! Preencha seus dados</h2>
            <p>Informe seus dados para finalizar a contratação do seu seguro.</p>
            <hr style="margin-bottom: 25px;">

            <form th:action="@{/cadastrar}" method="POST">
                <div class="grid-campos">

                    <div class="campo full-width">
                        <label>Nome Completo</label>
                        <input type="text" name="nome" placeholder="Ex: João Silva" required>
                    </div>

                    <div class="campo">
                        <label>CPF</label>
                        <input type="text" name="cpf" id="cpf" placeholder="000.000.000-00" required>
                    </div>

                    <div class="campo">
                        <label>E-mail (Seu Login)</label>
                        <input type="email" name="email" placeholder="seu@email.com" required>
                    </div>

                    <div class="campo">
                        <label>Telefone</label>
                        <input type="text" name="telefone" placeholder="(11) 99999-9999" required>
                    </div>

                    <div class="tres-colunas">
                        <div class="campo">
                            <label>CEP</label>
                            <input type="text" id="cep" name="cep" placeholder="00000-000" maxlength="9" required>
                        </div>
                        <div class="campo">
                            <label>Número</label>
                            <input type="text" name="numero" placeholder="Ex: 123" required>
                        </div>
                        <div class="campo">
                            <label>Complemento</label>
                            <input type="text" name="complemento" placeholder="Ex: Apt 12 / Bloco A">
                        </div>
                    </div>

                    <div class="campo full-width">
                        <label>Logradouro (Rua/Av)</label>
                        <input type="text" id="logradouro" name="logradouro" readonly
                            placeholder="Preenchido automaticamente pelo CEP">
                    </div>

                    <div class="campo">
                        <label>Bairro</label>
                        <input type="text" id="bairro" name="bairro" readonly>
                    </div>

                    <div class="campo">
                        <label>Cidade/UF</label>
                        <input type="text" id="cidade" name="cidade" readonly>
                    </div>

                    <div class="campo full-width">
                        <label>Crie uma Senha para Acesso</label>
                        <input type="password" name="senha" placeholder="******" required>
                    </div>

                    <button type="submit" class="btn-salvar full-width">Finalizar e Contratar Seguro</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('cep').addEventListener('blur', function () {
            let cep = this.value.replace(/\D/g, '');
            if (cep.length === 8) {
                fetch(`https://viacep.com.br/ws/${cep}/json/`)
                    .then(response => response.json())
                    .then(dados => {
                        if (!dados.erro) {
                            document.getElementById('logradouro').value = dados.logradouro;
                            document.getElementById('bairro').value = dados.bairro;
                            document.getElementById('cidade').value = dados.localidade + " - " + dados.uf;
                        } else {
                            alert("CEP não encontrado!");
                        }
                    });
            }
        });
    </script>
</body>

</html>
