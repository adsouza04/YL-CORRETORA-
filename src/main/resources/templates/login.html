<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login | YL Seguros</title>
    <link rel="stylesheet" th:href="@{/estilo.css}">
</head>

<body>
    <header>
        <div class="container topo">
            <h1>YL Seguros</h1>
            <nav>
                <ul>
                    <li><a th:href="@{/home}">Home</a></li>
                    <li><a th:href="@{/planos}">Planos</a></li>
                    <li><a th:href="@{/carrinho}">Carrinho</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="caixa-form" style="max-width: 400px; margin: 50px auto;">
            <h2 style="text-align: center;">Acesse sua Conta</h2>

            <form th:action="@{/efetuarLogin}" method="post">
                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" name="email" placeholder="email@exemplo.com" required>
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input type="password" name="senha" placeholder="Sua senha" required>
                </div>

                <p th:if="${erro}" th:text="${erro}" style="color: red; text-align: center;"></p>
                <p th:if="${param.erro}" style="color: red; text-align: center;">E-mail ou senha incorretos.</p>

                <button type="submit" class="btn-destaque" style="width: 100%; border: none; cursor: pointer;">
                    Entrar
                </button>
            </form>

            <div style="margin-top: 20px; text-align: center; font-size: 0.9rem;">
                <p>Ainda não tem conta? <a th:href="@{/cadastro}">Cadastre-se aqui</a></p>
                <br>
                <a th:href="@{/home}" style="color: #002855;">Voltar para Home</a>
            </div>
        </div>
    </main>
</body>

</html>
