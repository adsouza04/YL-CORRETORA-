<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Suporte YL Seguros | Chat</title>
    <link rel="stylesheet" th:href="@{/estilo.css}">
</head>

<body>

    <header>
        <div class="container topo">
            <h1>YL Seguros</h1>
            <nav>
                <ul>
                    <li><a th:href="@{/minha-conta}">⬅️ Voltar</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="chat-wrapper">
        <div class="chat-header">
            <h3>🤖 Assistente YL</h3>
            <p>Online agora</p>
        </div>

        <div class="chat-messages" id="chatBox">
            <div class="msg bot">
                Olá! Eu sou o assistente virtual da YL Seguros. Como posso te ajudar hoje?
            </div>
        </div>

        <div id="typing" class="typing-indicator">O robô está digitando...</div>

        <form class="chat-input-area" id="chatForm">
            <input type="text" id="userInput" placeholder="Digite sua dúvida aqui..." autocomplete="off" required>
            <button type="submit" class="btn-enviar-chat">Enviar</button>
        </form>
    </main>

    <script>
        const chatForm = document.getElementById('chatForm');
        const chatBox = document.getElementById('chatBox');
        const typing = document.getElementById('typing');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        chatForm.onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('userInput');
            const userText = input.value.trim();
            const textLower = userText.toLowerCase();

            if (userText) {
                addMessage(userText, 'user');
                input.value = '';
                
                typing.style.display = 'block';

                setTimeout(() => {
                    typing.style.display = 'none';
                    let response = "";

                    if (textLower.includes("boleto") || textLower.includes("pagar") || textLower.includes("pagamento")) {
                        response = "Você pode baixar a segunda via do seu boleto na seção 'Minhas Apólices' dentro do seu painel.";
                    } 
                    else if (textLower.includes("apolice") || textLower.includes("contrato") || textLower.includes("documento")) {
                        response = "Sua apólice digital está disponível para download em formato PDF na sua conta.";
                    }
                    else if (textLower.includes("sinistro") || textLower.includes("bater") || textLower.includes("roubo") || textLower.includes("furto")) {
                        response = "Sinto muito pelo ocorrido. Para acionar o seguro, ligue agora para nossa central 24h: 0800 770 0000.";
                    }
                    else if (textLower.includes("cancelar") || textLower.includes("cancelamento")) {
                        response = "Para cancelamentos, por favor, entre em contato com nosso setor de retenção pelo telefone (11) 4004-0000.";
                    }
                    else if (textLower.includes("oi") || textLower.includes("olá") || textLower.includes("bom dia")) {
                        response = "Olá! Como posso ajudar você com seu seguro hoje?";
                    }
                    else if (textLower.includes("obrigado") || textLower.includes("valeu") || textLower.includes("obrigada")) {
                        response = "De nada! A YL Seguros está à disposição. Tenha um ótimo dia!";
                    }
                    else {
                        response = "Não consegui compreender sua dúvida. Gostaria de falar com um atendente humano? (Nosso horário é de seg. a sex. das 09h às 18h).";
                    }

                    addMessage(response, 'bot');
                }, 1200);
            }
        };
    </script>
</body>

</html>
